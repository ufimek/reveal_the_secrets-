    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       hsl(220, 15%, 7%);
      --fg:       hsl(210, 20%, 88%);
      --card:     hsl(220, 12%, 11%);
      --border:   hsl(220, 10%, 20%);
      --accent:   hsl(230, 60%, 65%);
      --muted:    hsl(220, 12%, 30%);
      --muted-fg: hsl(220, 10%, 55%);
    }

    html, body {
      height: auto;
      overflow: hidden;
      background-color: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    .oracle-page {
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      overflow: hidden;
    }

    .fog-vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 0%, hsl(220, 15%, 7%) 80%);
      opacity: 0.85;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 900px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    h1 {
      font-family: 'William Text LCG', serif;
      font-weight: 400;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      letter-spacing: 0.01em;
      text-align: center;
      color: var(--fg);
      line-height: 1.1;
    }

    /* shared text style */
    .body-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.65;
      color: var(--muted-fg);
      text-align: center;
      max-width: 560px;
    }

    /* ── FORM ── */
    .form-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeSlideIn 0.55s cubic-bezier(0.21, 0.47, 0.32, 0.98) both;
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.21, 0.47, 0.32, 0.98);
    }
    .form-section.exiting {
      opacity: 0;
      transform: translateY(-22px);
      pointer-events: none;
    }

    .input-area {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    textarea {
      width: 100%;
      height: 130px;
      background: hsl(220, 12%, 15%);
      border: 1px solid hsl(220, 10%, 32%);
      border-radius: 16px;
      padding: 24px;
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.65;
      resize: none;
      outline: none;
      transition: border-color 0.5s ease, box-shadow 0.5s ease, background 0.5s ease;
      -webkit-appearance: none;
    }
    textarea::placeholder { color: var(--muted); }
    textarea:focus {
      border-color: hsla(230, 60%, 65%, 0.45);
      box-shadow: 0 0 32px hsla(230, 60%, 65%, 0.12);
      background: hsl(220, 12%, 13%);
    }

    .submit-btn {
      position: relative;
      padding: 14px 44px;
      border-radius: 999px;
      border: 1px solid hsla(220, 10%, 40%, 0.5);
      background: transparent;
      color: var(--muted-fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 1rem;
      font-weight: 300;
      cursor: pointer;
      transition: color 0.6s ease, border-color 0.6s ease, box-shadow 0.6s ease;
      overflow: hidden;
    }
    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: radial-gradient(circle at center, hsla(230, 60%, 65%, 0.14) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .submit-btn:hover { color: var(--accent); border-color: hsla(230, 60%, 65%, 0.35); box-shadow: 0 0 22px hsla(230, 60%, 65%, 0.18); }
    .submit-btn:hover::after { opacity: 1; }
    .submit-btn:active { transform: scale(0.98); }

    /* ── LOADING ── */
    .loading-section {
      width: 100%;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.4s ease both;
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.21, 0.47, 0.32, 0.98);
    }
    .loading-section.exiting {
      opacity: 0;
      transform: translateY(-22px);
      pointer-events: none;
    }
    .loading-phrase {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: var(--muted-fg);
      text-align: center;
      max-width: 400px;
      line-height: 1.65;
      animation: phraseFadeIn 0.5s cubic-bezier(0.21, 0.47, 0.32, 0.98) both;
    }

    /* ── USER PROBLEM BLOCK ── */
    .user-problem {
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: center;
      max-width: 560px;
    }
    .problem-label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      color: hsla(220, 10%, 55%, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    .problem-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: hsla(210, 20%, 88%, 0.7);
      line-height: 1.65;
    }

    /* ── CARDS ── */
    .cards-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeSlideIn 0.65s cubic-bezier(0.21, 0.47, 0.32, 0.98) both;
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.21, 0.47, 0.32, 0.98);
    }
    .cards-section.exiting {
      opacity: 0;
      transform: translateY(-22px);
      pointer-events: none;
    }

    .cards-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 768px) {
      .cards-grid { grid-template-columns: 1fr; gap: 20px; max-width: 400px; }
    }

    .card {
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1px solid hsla(220, 10%, 30%, 0.5);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform 0.5s ease, box-shadow 0.5s ease, border-color 0.5s ease;
      opacity: 0;
      transform: translateY(28px);
    }
    .card.visible { animation: cardReveal 0.75s cubic-bezier(0.21, 0.47, 0.32, 0.98) forwards; }
    .card:nth-child(1) { animation-delay: 0s; }
    .card:nth-child(2) { animation-delay: 0.15s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:hover { transform: translateY(-8px); box-shadow: 0 16px 48px hsla(230, 60%, 65%, 0.1); border-color: hsla(230, 60%, 65%, 0.3); }

    .card-image-wrap {
      aspect-ratio: 4 / 5;
      overflow: hidden;
      position: relative;
      border-bottom: 1px solid hsla(220, 10%, 25%, 0.6);
      background: hsl(220, 12%, 9%);
    }
    .card-overlay { position: absolute; inset: 0; background: hsla(220, 15%, 7%, 0.2); transition: background 0.7s ease; z-index: 1; }
    .card:hover .card-overlay { background: transparent; }
    .card-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.82; transition: transform 1s ease, opacity 0.7s ease; }
    .card:hover .card-image-wrap img { transform: scale(1.05); opacity: 1; }

    .card-body { padding: 22px 24px 26px; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
    .card-instrument {
      font-family: 'William Text LCG', Georgia, 'Times New Roman', serif;
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--fg);
      line-height: 1.3;
      transition: color 0.5s ease;
    }
    .card:hover .card-instrument { color: var(--accent); }
    .card-author {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--muted-fg);
      margin-top: auto;
    }

    .back-btn {
      background: none;
      border: none;
      border-bottom: 1px solid transparent;
      padding-bottom: 2px;
      color: var(--muted-fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 1rem;
      font-weight: 300;
      cursor: pointer;
      transition: color 0.4s ease, border-color 0.4s ease;
    }
    .back-btn:hover { color: hsla(210, 20%, 88%, 0.7); border-bottom-color: hsla(220, 10%, 55%, 0.4); }

    /* ── ANIMATIONS ── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes phraseFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="oracle-page">
    <div class="fog-vignette"></div>
    <div class="content">
      <h1>сонное сознание</h1>

      <!-- FORM VIEW -->
      <div class="form-section" id="form-section">
        <p class="body-text">поделитесь проблемой, связанной с вашим художественным исследованием — мы, сонное сознание, заглянем в сны и архивы участников лаборатории и предложим, чем мы можем вам помочь</p>
        <div class="input-area">
          <textarea id="oracle-input" placeholder="..." aria-label="Ваша художественная проблема"></textarea>
          <button class="submit-btn" id="oracle-submit">мне уже ничего не поможет</button>
        </div>
      </div>

      <!-- LOADING VIEW -->
      <div class="loading-section hidden" id="loading-section">
        <p class="loading-phrase" id="loading-phrase"></p>
      </div>

      <!-- CARDS VIEW -->
      <div class="cards-section hidden" id="cards-section">
        <div class="user-problem" id="user-problem-block">
          <p class="problem-label">ваша проблема</p>
          <p class="problem-text" id="problem-text"></p>
        </div>
        <p class="body-text">мы, сонное сознание, думаем, что вам могут помочь следующие инструменты:</p>
        <div class="cards-grid" id="cards-grid"></div>
        <button class="back-btn" id="back-btn">← задать другой вопрос</button>
      </div>
    </div>
  </div>

  <script>
    const ALL_CARDS = [
      { author: "Ляйсан Азаматова", instrument: "Встречное движение", image: "https://static.tildacdn.com/tild6663-6466-4638-b364-333930333537/_.jpg", url: "https://secrets.zaman.museum/azamatova" },
      { author: "Ольга Антипина", instrument: "Эолова арфа", image: "https://static.tildacdn.com/tild3537-6230-4365-a233-383037323065/result_IMG_20260313_.jpg", url: "https://secrets.zaman.museum/antipina" },
      { author: "Ольга Антипина", instrument: "Слеза Руперта", image: "https://static.tildacdn.com/tild6663-3238-4339-b765-326332636536/result_IMG_20260313_.jpg", url: "https://secrets.zaman.museum/antipina" },
      { author: "Ольга Антипина", instrument: "Фонтан Пирена", image: "https://static.tildacdn.com/tild6161-3263-4538-a339-653231653263/result_IMG_20260313_.jpg", url: "https://secrets.zaman.museum/antipina" },
      { author: "Ванька–Ленки–Витьки–Шуньки–Мишки–Дунина", instrument: "Доппельгангер + Под брусчаткой пляж + Тайник", image: "https://static.tildacdn.com/tild6365-3235-4663-b931-306638363832/_.jpg", url: "https://secrets.zaman.museum/v-l-v-sh-m-d" },
      { author: "Екатерина Волкова (Кашкӑр)", instrument: "УПРА/УСРА/УЯ", image: "https://static.tildacdn.com/tild6638-6463-4266-a564-383238336638/__page-0001.jpg", url: "https://secrets.zaman.museum/kashkar" },
      { author: "Дарья Иванова", instrument: "Слеза", image: "https://static.tildacdn.com/tild6438-6131-4431-b833-633964383162/instrument_Daria.jpg", url: "https://secrets.zaman.museum/ivanova" },
      { author: "Лада Ладная", instrument: "Преодоление двойственности", image: "https://static.tildacdn.com/tild6563-3666-4134-a561-626230613963/_.png", url: "https://secrets.zaman.museum/ladnaya" },
      { author: "Айгуль Нургалиева", instrument: "Логические машины Раймонда Луллия", image: "https://static.tildacdn.com/tild6163-3933-4436-b661-613661666464/_.jpg", url: "https://secrets.zaman.museum/nurgalieva" },
      { author: "Мария Сарычева", instrument: "Постоянно помни про Итаку", image: "https://static.tildacdn.com/tild3730-3231-4630-b133-393633353734/instrument_sarycheva.jpg", url: "https://secrets.zaman.museum/sarycheva" },
      { author: "Синий Карандаш", instrument: "Игра «Жизнь» Джона Конвея", image: "https://static.tildacdn.com/tild3535-3966-4263-a632-383339376666/Blue_Pencil_Instrume.jpg", url: "https://secrets.zaman.museum/karandash" },
      { author: "Ирина Торганова", instrument: "Слой пустоты", image: "https://static.tildacdn.com/tild3139-3635-4235-b866-356232653266/_.jpg", url: "https://secrets.zaman.museum/torganova" },
      { author: "Альфия Шамсутдинова", instrument: "Цепь Маркова и Эолова арфа", image: "https://static.tildacdn.com/tild3664-3564-4466-b336-353063643465/_.jpg", url: "https://secrets.zaman.museum/shamsutdinova" },
    ];

    const LOADING_PHRASES = [
      "ситуация действительно непростая",
      "думаем над вашей проблемой",
      "кажется, нашли инструменты, которые могут помочь",
    ];
    const PHRASE_DURATIONS = [1800, 1800, 1600];

    const formSection    = document.getElementById('form-section');
    const loadingSection = document.getElementById('loading-section');
    const cardsSection   = document.getElementById('cards-section');
    const cardsGrid      = document.getElementById('cards-grid');
    const loadingPhrase  = document.getElementById('loading-phrase');
    const problemText    = document.getElementById('problem-text');

    function pickThree(cards) {
      const shuffled = [...cards].sort(() => Math.random() - 0.5);
      const seen = new Set();
      const result = [];
      for (const card of shuffled) {
        if (!seen.has(card.author)) {
          seen.add(card.author);
          result.push(card);
          if (result.length === 3) break;
        }
      }
      return result;
    }

    function buildCards(picked) {
      cardsGrid.innerHTML = '';
      picked.forEach((card, i) => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = card.url;
        a.target = '_blank';
        a.rel = 'noreferrer';
        a.setAttribute('data-testid', 'card-' + i);
        a.innerHTML = `
          <div class="card-image-wrap">
            <div class="card-overlay"></div>
            <img data-testid="card-image-${i}" src="${card.image}" alt="${card.instrument}" loading="lazy" />
          </div>
          <div class="card-body">
            <div class="card-instrument" data-testid="card-instrument-${i}">${card.instrument}</div>
            <div class="card-author" data-testid="card-author-${i}">${card.author}</div>
          </div>
        `;
        cardsGrid.appendChild(a);
      });
    }

    function showSection(hideEl, showEl, onShown) {
      hideEl.classList.add('exiting');
      hideEl.addEventListener('transitionend', function onExit(e) {
        if (e.propertyName !== 'opacity') return;
        hideEl.removeEventListener('transitionend', onExit);
        hideEl.classList.add('hidden');
        hideEl.classList.remove('exiting');
        showEl.classList.remove('hidden');
        showEl.style.animation = 'none';
        showEl.offsetHeight;
        showEl.style.animation = '';
        if (onShown) onShown();
      });
    }

    let loadingTimers = [];

    function clearLoadingTimers() {
      loadingTimers.forEach(clearTimeout);
      loadingTimers = [];
    }

    function runLoadingSequence(picked) {
      clearLoadingTimers();
      let idx = 0;

      function showPhrase(i) {
        loadingPhrase.style.animation = 'none';
        loadingPhrase.offsetHeight;
        loadingPhrase.style.animation = '';
        loadingPhrase.textContent = LOADING_PHRASES[i];
      }

      showPhrase(0);

      const advance = () => {
        idx++;
        if (idx < LOADING_PHRASES.length) {
          showPhrase(idx);
          loadingTimers.push(setTimeout(advance, PHRASE_DURATIONS[idx]));
        } else {
          loadingTimers.push(setTimeout(() => {
            buildCards(picked);
            showSection(loadingSection, cardsSection, () => {
              cardsGrid.querySelectorAll('.card').forEach(c => {
                requestAnimationFrame(() => requestAnimationFrame(() => c.classList.add('visible')));
              });
              sendHeight();
            });
          }, 700));
        }
      };

      loadingTimers.push(setTimeout(advance, PHRASE_DURATIONS[0]));
    }

    function handleSubmit() {
      const input = document.getElementById('oracle-input');
      if (!input.value.trim()) return;
      problemText.textContent = input.value.trim();
      const picked = pickThree(ALL_CARDS);
      showSection(formSection, loadingSection, () => { runLoadingSequence(picked); sendHeight(); });
    }

    function showForm() {
      clearLoadingTimers();
      showSection(cardsSection, formSection, () => {
        document.getElementById('oracle-input').value = '';
        sendHeight();
      });
    }

    document.getElementById('oracle-submit').addEventListener('click', handleSubmit);
    document.getElementById('back-btn').addEventListener('click', showForm);
    document.getElementById('oracle-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' & !e.shiftKey) { e.preventDefault(); handleSubmit(); }
    });

    function sendHeight() {
      var h = document.body.scrollHeight;
      window.parent.postMessage({ type: 'soznanie-height', height: h }, '*');
    }
    window.addEventListener('load', sendHeight);
  </script>
</body>
</html>
